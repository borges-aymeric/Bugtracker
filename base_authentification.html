<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>BASE D'AUTHENTIFICATION</title>
	<style>
	body {
		font-family: Arial, sans-serif;
		margin: 0;
		padding: 20px;

	h1 {
		text-align: center;
	}
	fieldset {
			margin-bottom: 20px;

<body>

	<h1>Base d'authentification BUGTRACKER</h1>

	<hr>
	

	<fieldset>
		<legend>Formulaire d'authentification</legend>

			<form  method="post" action="connexion.php">
				
				<p>
					<label for="login"> Entrez votre identifiant : </label>
